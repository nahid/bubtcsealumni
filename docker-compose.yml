name: ${COMPOSE_PROJECT_NAME}

services:
  bubtcsealumni-nginx:
    image: ${NGINX_IMAGE}
    container_name: ${NGINX_CONTAINER_NAME}
    restart: ${RESTART_POLICY}
    volumes:
      - ${APP_CODE_PATH}:/var/www/app
      - ${NGINX_MAIN_CONF}:/etc/nginx/nginx.conf:ro
      - ${NGINX_APP_CONF}:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bubtcsealumni-app
    networks:
      - bubtcsealumni
      - proxy_manager

  bubtcsealumni-app:
    build:
      context: ${APP_BUILD_CONTEXT}
      dockerfile: ${APP_DOCKERFILE}
    container_name: ${APP_CONTAINER_NAME}
    restart: ${RESTART_POLICY}
    volumes:
      - ${APP_CODE_PATH}:/var/www/app
    depends_on:
      bubtcsealumni-postgres:
        condition: service_healthy
      bubtcsealumni-redis:
        condition: service_healthy
    networks:
      - bubtcsealumni

  bubtcsealumni-worker:
    build:
      context: ${APP_BUILD_CONTEXT}
      dockerfile: ${WORKER_DOCKERFILE}
    container_name: ${WORKER_CONTAINER_NAME}
    restart: ${RESTART_POLICY}
    volumes:
      - ${APP_CODE_PATH}:/var/www/app
    depends_on:
      bubtcsealumni-postgres:
        condition: service_healthy
      bubtcsealumni-redis:
        condition: service_healthy
    networks:
      - bubtcsealumni

  bubtcsealumni-postgres:
    image: ${POSTGRES_IMAGE}
    container_name: ${POSTGRES_CONTAINER_NAME}
    restart: ${RESTART_POLICY}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - bubtcsealumni_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: ${POSTGRES_HEALTHCHECK_INTERVAL}
      timeout: ${POSTGRES_HEALTHCHECK_TIMEOUT}
      retries: ${POSTGRES_HEALTHCHECK_RETRIES}
    networks:
      - bubtcsealumni

  bubtcsealumni-redis:
    image: ${REDIS_IMAGE}
    container_name: ${REDIS_CONTAINER_NAME}
    restart: ${RESTART_POLICY}
    command: ["${REDIS_SERVER_COMMAND}", "${REDIS_APPENDONLY_FLAG}", "${REDIS_APPENDONLY}"]
    volumes:
      - bubtcsealumni_redis_data:/data
    healthcheck:
      test: ["CMD", "${REDIS_CLI_COMMAND}", "ping"]
      interval: ${REDIS_HEALTHCHECK_INTERVAL}
      timeout: ${REDIS_HEALTHCHECK_TIMEOUT}
      retries: ${REDIS_HEALTHCHECK_RETRIES}
    networks:
      - bubtcsealumni

volumes:
  bubtcsealumni_postgres_data:
    name: ${POSTGRES_VOLUME_NAME}
  bubtcsealumni_redis_data:
    name: ${REDIS_VOLUME_NAME}

networks:
  bubtcsealumni:
    name: ${APP_NETWORK_NAME}
    driver: ${APP_NETWORK_DRIVER}
  proxy_manager:
    external: true
    name: ${NPM_NETWORK}
