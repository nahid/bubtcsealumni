[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/var/run/supervisord.pid

[program:cron]
command=/usr/sbin/crond -f -l 2
stdout_logfile=/var/log/cron-worker.log
stderr_logfile=/var/log/cron-worker.error.log
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
autorestart=true

[program:worker-default]
process_name=%(program_name)s_%(process_num)02d
command=php artisan queue:work --verbose --tries=3 --timeout=300
directory=/var/www/app
autostart=true
autorestart=true
user=root
numprocs=2
redirect_stderr=false
stdout_logfile=/var/log/default-worker.log
stderr_logfile=/var/log/default-worker.error.log
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB
stdout_logfile_backups=10
stderr_logfile_backups=10


[program:worker-schedule]
command=php artisan schedule:work
directory=/var/www/app
autostart=true
autorestart=true
user=root
redirect_stderr=false
stdout_logfile=/var/log/schedule-worker.log
stderr_logfile=/var/log/schedule-worker.error.log
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB
stdout_logfile_backups=10
stderr_logfile_backups=10

[program:reverb]
command=php artisan reverb:start --host=0.0.0.0 --port=8080 --hostname=api.bdfamily.net --verbose
directory=/var/www/app
autostart=true
autorestart=true
user=root
redirect_stderr=false
stdout_logfile=/var/log/reverb.log
stderr_logfile=/var/log/reverb.error.log
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB
stdout_logfile_backups=10
stderr_logfile_backups=10